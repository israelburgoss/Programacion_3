<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Catálogo de Productos</title>
</head>
<body>
	<h1>Catálogo Simple de Productos</h1>

	<table border="1">
		<tr>
			<th>Imagen</th>
			<th>Codigo</th>
			<th>Nombre del producto</th>
			<th>Precio</th>
			<th>Disponibilidad</th>
		</tr>
		<tr>
			<td><img src="assets/img/olimpia.webp" alt="Producto Olimpia" width="120"></td>
			<td>001</td>
			<td>Olimpia</td>
			<td>$1.62</td>
			<td>Disponible</td>
		</tr>
		<tr>
			<td><img src="assets/img/fuze-tea.webp" alt="Producto Fuze Tea" width="120"></td>
			<td>002</td>
			<td>Fuze Tea</td>
			<td>$2.50</td>
			<td>Disponible</td>
		</tr>
		<tr>
			<td><img src="assets/img/resistencia.webp" alt="Producto Resistencia" width="120"></td>
			<td>003</td>
			<td>Resistencia</td>
			<td>$0.50</td>
			<td>Agotado</td>
		</tr>
	</table>
</body>
</html>
